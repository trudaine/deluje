name: Unit Tests

on:
  workflow_dispatch:

jobs:
  test:
    name: JVM tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 27
        uses: actions/setup-java@v4
        with:
          java-version: '27-ea'
          distribution: 'temurin'
          cache: maven
          server-id: github

      - name: Run JVM tests
        run: mvn test -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
